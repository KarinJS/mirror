name: Build Package

on:
  workflow_call:

env:
  APP_NAME: mirror

jobs:
  build_webui:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 WebUI
        run: pnpm --filter webui build

      - name: 上传 WebUI 产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webui-dist
          path: webui/dist/

  build_windows:
    needs: [build_webui]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            label: windows-arm64


    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: 设置 rust
        uses: puniyu/setup-rust@a6d1a3adea77d13cf52ef1c0d9c02dc11f620e5a # main
        with:
          target: ${{ matrix.platform.target }}
          cache: true
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.platform.target }}

      - name: 下载 WebUI 产物
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui-dist/

      - name: 打包发布文件
        shell: pwsh
        run: |
          $target = "${{ matrix.platform.target }}"
          $label = "${{ matrix.platform.label }}"
          $tmp = "pkg_tmp"
          New-Item -ItemType Directory -Force $tmp | Out-Null
          New-Item -ItemType Directory -Force "$tmp/webui" | Out-Null
          Copy-Item "target/$target/release/${{ env.APP_NAME }}.exe" "$tmp/"
          Copy-Item -Recurse webui-dist/* "$tmp/webui/"
          Compress-Archive -Path "$tmp/*" -DestinationPath "${{ env.APP_NAME }}-$label.zip"
          Remove-Item -Recurse -Force $tmp

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.label }}"
          path: "${{ env.APP_NAME }}-${{ matrix.platform.label }}.zip"

  build_macos:
    needs: [build_webui]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: 设置 rust
        uses: puniyu/setup-rust@a6d1a3adea77d13cf52ef1c0d9c02dc11f620e5a # main
        with:
          target: ${{ matrix.platform.target }}
          cache: true
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.platform.target }}

      - name: 下载 WebUI 产物
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui-dist/

      - name: 打包发布文件
        run: |
          label="${{ matrix.platform.label }}"
          target="${{ matrix.platform.target }}"
          mkdir -p pkg_tmp/webui
          cp "target/${target}/release/${{ env.APP_NAME }}" pkg_tmp/
          cp -r webui-dist/. pkg_tmp/webui/
          tar -czf "${{ env.APP_NAME }}-${label}.tar.gz" -C pkg_tmp .
          rm -rf pkg_tmp

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.label }}"
          path: "${{ env.APP_NAME }}-${{ matrix.platform.label }}.tar.gz"

  build_linux:
    needs: [build_webui]
    runs-on: ${{ matrix.platform.runner }}
    container: ${{ matrix.platform.container }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-arm64

    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: 设置 rust
        uses: puniyu/setup-rust@a6d1a3adea77d13cf52ef1c0d9c02dc11f620e5a # main
        with:
          target: ${{ matrix.platform.target }}
          cache: true
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.platform.target }}

      - name: 下载 WebUI 产物
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui-dist/

      - name: 打包发布文件
        run: |
          label="${{ matrix.platform.label }}"
          target="${{ matrix.platform.target }}"
          mkdir -p pkg_tmp/webui
          cp "target/${target}/release/${{ env.APP_NAME }}" pkg_tmp/
          cp -r webui-dist/. pkg_tmp/webui/
          tar -czf "${{ env.APP_NAME }}-${label}.tar.gz" -C pkg_tmp .
          rm -rf pkg_tmp

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.label }}"
          path: "${{ env.APP_NAME }}-${{ matrix.platform.label }}.tar.gz"

  summary:
    needs: [build_windows, build_macos, build_linux]
    runs-on: ubuntu-latest
    steps:
      - name: 下载指引
        shell: bash
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 构建产物下载指引

          | 产物 | 适用系统 |
          | --- | --- |
          | **mirror-windows-x64.zip** | Windows 10/11 x64 — 绝大多数 Windows 电脑 (Intel / AMD) |
          | **mirror-windows-arm64.zip** | Windows on ARM — Surface Pro X、骁龙本等 ARM 设备 |
          | **mirror-macos-x64.tar.gz** | Intel 芯片的 Mac |
          | **mirror-macos-arm64.tar.gz** | Apple Silicon Mac (M1 / M2 / M3 / M4) |
          | **mirror-linux-x64.tar.gz** | 大多数 Linux 发行版 x64 (Intel / AMD) |
          | **mirror-linux-arm64.tar.gz** | ARM Linux — 树莓派 4/5、ARM 服务器等 |

          > 如果不确定，x64 是默认选择。在"设置 → 系统 → 关于"中查看"系统类型"可以确认。
          EOF
