name: release
on:
  push:
    branches:
      - main
  pull_request_target:
  workflow_dispatch:


env:
  APP_NAME: mirror

jobs:
  build:
    uses: ./.github/workflows/build.yaml

  publish-github-release:
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v7
        with:
          pattern: "${{ env.APP_NAME }}-*"
          merge-multiple: true
          path: ./artifacts/

      - name: 打包发布文件
        shell: bash
        run: |
          shopt -s nullglob
          cd artifacts
          echo "=== artifacts 目录内容 ==="
          ls -laR
          for d in "${{ env.APP_NAME }}"-*/; do
            name="${d%/}"
            echo "打包: ${name}"
            if [[ "$name" == *windows* ]]; then
              (cd "$name" && zip -r "../${name}.zip" .)
            else
              tar -czf "${name}.tar.gz" -C "$name" .
            fi
          done
          echo "=== 最终产物 ==="
          ls -la

      - name: 上传主程序 Release
        if: ${{ steps.get-tag.outputs.puniyu_tag }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/${{ env.APP_NAME }}-*.zip
            artifacts/${{ env.APP_NAME }}-*.tar.gz
          tag_name: ${{ steps.get-tag.outputs.puniyu_tag }}
